---
- name: Installation de Docker sur les instances AWS
  hosts: all
  become: true  # On utilise sudo pour les installations

  tasks:
    - name: Mettre à jour le cache des paquets (apt update)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Installer les dépendances système
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Installer Docker et Docker-Compose
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Demarrer et activer le service Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ajouter l'utilisateur ubuntu au groupe docker
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true
